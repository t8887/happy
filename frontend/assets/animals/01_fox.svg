<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg1)"/>
  <!-- Stars -->
  <circle cx="50" cy="50" r="3" fill="#FFB300" opacity="0.6"/>
  <circle cx="350" cy="80" r="2" fill="#FFB300" opacity="0.5"/>
  <circle cx="320" cy="30" r="3" fill="#FF8F00" opacity="0.5"/>
  <circle cx="80" cy="320" r="2" fill="#FFB300" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="200" cy="280" rx="70" ry="55" fill="#E64A19"/>
  <!-- Tail -->
  <ellipse cx="295" cy="290" rx="45" ry="25" fill="#E64A19" transform="rotate(-20 295 290)"/>
  <ellipse cx="305" cy="282" rx="20" ry="12" fill="white" transform="rotate(-20 305 282)"/>
  <!-- Head -->
  <circle cx="200" cy="185" r="65" fill="#E64A19"/>
  <!-- Ears -->
  <polygon points="150,140 130,85 175,125" fill="#E64A19"/>
  <polygon points="250,140 270,85 225,125" fill="#E64A19"/>
  <polygon points="152,138 138,98 172,123" fill="#FF8A65"/>
  <polygon points="248,138 262,98 228,123" fill="#FF8A65"/>
  <!-- Face white muzzle -->
  <ellipse cx="200" cy="205" rx="35" ry="28" fill="#FFCCBC"/>
  <!-- Eyes -->
  <circle cx="180" cy="178" r="12" fill="white"/>
  <circle cx="220" cy="178" r="12" fill="white"/>
  <circle cx="183" cy="179" r="7" fill="#4E342E"/>
  <circle cx="223" cy="179" r="7" fill="#4E342E"/>
  <circle cx="185" cy="177" r="3" fill="white"/>
  <circle cx="225" cy="177" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="200" rx="7" ry="5" fill="#4E342E"/>
  <!-- Smile -->
  <path d="M188 210 Q200 220 212 210" stroke="#4E342E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="165" cy="200" r="10" fill="#FF8A65" opacity="0.5"/>
  <circle cx="235" cy="200" r="10" fill="#FF8A65" opacity="0.5"/>
  <!-- Paws -->
  <ellipse cx="160" cy="325" rx="22" ry="15" fill="#E64A19"/>
  <ellipse cx="240" cy="325" rx="22" ry="15" fill="#E64A19"/>
  <!-- Quote -->
  <text x="200" y="368" font-family="Georgia, serif" font-size="15" font-style="italic" text-anchor="middle" fill="#BF360C" font-weight="bold">"Be Clever, Be Bold!"</text>
</svg>
