<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg2)"/>
  <circle cx="60" cy="60" r="4" fill="#66BB6A" opacity="0.5"/>
  <circle cx="340" cy="50" r="3" fill="#43A047" opacity="0.4"/>
  <circle cx="370" cy="340" r="4" fill="#66BB6A" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="200" cy="285" rx="80" ry="65" fill="#6D4C41"/>
  <!-- Belly -->
  <ellipse cx="200" cy="295" rx="50" ry="42" fill="#A1887F"/>
  <!-- Head -->
  <circle cx="200" cy="185" r="72" fill="#6D4C41"/>
  <!-- Ears -->
  <circle cx="148" cy="130" r="25" fill="#6D4C41"/>
  <circle cx="252" cy="130" r="25" fill="#6D4C41"/>
  <circle cx="148" cy="130" r="15" fill="#A1887F"/>
  <circle cx="252" cy="130" r="15" fill="#A1887F"/>
  <!-- Muzzle -->
  <ellipse cx="200" cy="210" rx="38" ry="28" fill="#A1887F"/>
  <!-- Eyes -->
  <circle cx="178" cy="178" r="13" fill="white"/>
  <circle cx="222" cy="178" r="13" fill="white"/>
  <circle cx="181" cy="179" r="8" fill="#212121"/>
  <circle cx="225" cy="179" r="8" fill="#212121"/>
  <circle cx="183" cy="177" r="3" fill="white"/>
  <circle cx="227" cy="177" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="205" rx="9" ry="6" fill="#212121"/>
  <!-- Smile -->
  <path d="M186 218 Q200 230 214 218" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="162" cy="206" r="11" fill="#EF9A9A" opacity="0.5"/>
  <circle cx="238" cy="206" r="11" fill="#EF9A9A" opacity="0.5"/>
  <!-- Arms -->
  <ellipse cx="130" cy="295" rx="22" ry="40" fill="#6D4C41" transform="rotate(-15 130 295)"/>
  <ellipse cx="270" cy="295" rx="22" ry="40" fill="#6D4C41" transform="rotate(15 270 295)"/>
  <!-- Paws -->
  <ellipse cx="155" cy="332" rx="22" ry="14" fill="#6D4C41"/>
  <ellipse cx="245" cy="332" rx="22" ry="14" fill="#6D4C41"/>
  <!-- Quote -->
  <text x="200" y="370" font-family="Georgia, serif" font-size="14" font-style="italic" text-anchor="middle" fill="#2E7D32" font-weight="bold">"Strong &amp; Unstoppable!"</text>
</svg>
